name: Create Jira Incident Ticket
enabled: true
description: Creates a Jira ticket when an incident is detected by the agent
triggers:
  - type: manual
consts:
  jira_project_key: BTS
  jira_url: https://basementstudios.atlassian.net
  jira_auth: "a2F2aW4ubW9oYW4uMjAwNUBnbWFpbC5jb206QVRBVFQzeEZmR0YwMFQwMEFyWkZXcjRsalZBUDVQY3hfMDEwZm53X29WMzI2dFdMVmhXdWdydGtCRExVc3k0TEJVTFRuRE02Wlc3cGlIclB5SXdUWHY1eUx3LXRQMExGRGZLaWNoV0g1SWJsTEk5UFhQWk1GRjJVTS10cjdWV3pveHF1cnpTMVRQUzJUeUJhYl9veE9oRndUcHVONE05QUozQ0NKajY5UE5wRmFvTXNPUUNEcXBNPTM1OTQ4MUU0"

inputs:
  - name: incident_summary
    type: string
    default: "n/a"
    description: "Summary of the incident"
  - name: affected_services
    type: string
    description: "Comma seperated list of affected services"
  - name: severity
    type: string
    default: "Medium"
    description: "Incident severity (Highest, High, Medium, Low, Lowest)"
  - name: root_cause
    type: string
    description: "Root cause hypothesis"
  - name: error_count
    type: string
    description: "Number of errors detected"
  - name: error_types
    type: string
    description: "Top Error types identified"

steps:
  - name: create_jira_ticket
    type: http
    with:
      url: "{{ consts.jira_url }}/rest/api/3/issue"
      method: POST
      headers:
        Content-Type: application/json
        Authorization: "Basic {{ consts.jira_auth }}"
      body:
        fields:
          project:
            key: "{{ consts.jira_project_key }}"
          summary: "[INCIDENT] {{ inputs.incident_summary }}"
          description:
            type: doc
            version: 1
            content:
              - type: paragraph
                content:
                  - type: text
                    text: "Incident Summary"
                    marks:
                      - type: strong
              - type: paragraph
                content:
                  - type: text
                    text: "{{ inputs.incident_summary }}"
              - type: paragraph
                content:
                  - type: text
                    text: "Affected Services"
                    marks:
                      - type: strong
              - type: paragraph
                content:
                  - type: text
                    text: "{{ inputs.affected_services }}"
              - type: paragraph
                content:
                  - type: text
                    text: "Severity"
                    marks:
                      - type: strong
              - type: paragraph
                content:
                  - type: text
                    text: "{{ inputs.severity }}"
              - type: paragraph
                content:
                  - type: text
                    text: "Error Count"
                    marks:
                      - type: strong
              - type: paragraph
                content:
                  - type: text
                    text: "{{ inputs.error_count }} errors detected"
              - type: paragraph
                content:
                  - type: text
                    text: "Top Error Types"
                    marks:
                      - type: strong
              - type: paragraph
                content:
                  - type: text
                    text: "{{ inputs.error_types }}"
              - type: paragraph
                content:
                  - type: text
                    text: "Root Cause Analysis"
                    marks:
                      - type: strong
              - type: paragraph
                content:
                  - type: text
                    text: "{{ inputs.root_cause }}"
              - type: rule
              - type: paragraph
                content:
                  - type: text
                    text: "Auto-generated by Elastic Incident Response Agent"
          issuetype:
            name: "Task"
          priority:
            id: "3"
  - name: index_incident
    type: elasticsearch.request
    with:
      method: POST
      path: /incidents/_doc
      body:
        ticket_id: "{{ steps.create_jira_ticket.output.id }}"
        ticket_key: "{{ steps.create_jira_ticket.output.key }}"
        summary: "{{ inputs.incident_summary }}"
        affected_services: "{{ inputs.affected_services }}"
        severity: "{{ inputs.severity }}"
        created_at: "{{ execution.startedAt }}"
        source: elastic-agent
